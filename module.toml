[module]
id            = "paintsharp"
display_name  = "PaintSharp"
version       = "0.1.2"
description   = "Suite créative — Layer (raster), Apex (vectoriel), Motion (vidéo), Vertex (3D), Keyframe (animation 2D), PdfWriter (édition PDF)."
author        = "Kubuno Contributors"
license       = "AGPL-3.0"
homepage_url  = "https://github.com/kubuno/kubuno"
runtime       = "rust"
dependencies  = []
settings_path = "/paintsharp/settings"

[process]
entrypoint = "kubuno-paintsharp"
args       = []

[server]
host = "127.0.0.1"
port = 3106

[routes]
patterns = [
    { method = "*", path = "/*" },
]

